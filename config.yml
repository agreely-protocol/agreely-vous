application:
  environment: !env APP_ENV, dev
  debug: !env APP_DEBUG, true

localization:
  locale: "fr"
  supported_locales:
    - "fr"
    - "en"
  locale_path: "locale"
  timezone: "America/Montreal"

render:
  engine: "latte"
  directory: "app/Views"
  cache: "cache/latte"
  mode: "always"

leaf:
  name: "Agreely"
  version: "1.0.0"
  description: "Un recu pour chaque oui, et le pouvoir de retirer votre accord quand vous le voulez. Agreely, pour les citoyens du Quebec."
  github_url: "https://github.com/ophelios-studio/agreely"
  content_path: "content"
  output_path: "dist"
  base_url: ""
  production_url: "https://vous.agreely.ca"
  author: "Ophelios Studio"
  author_url: "https://ophelios.com"
  license: "Proprietary"
  sections: {}
